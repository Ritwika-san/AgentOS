<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0f; color: #e0e0e0; }
        .navbar { background-color: #12121a; border-bottom: 1px solid #7f77dd; }
        .navbar-brand { color: #7f77dd !important; font-weight: bold; font-size: 1.4rem; }
        .card { background-color: #12121a; border: 1px solid #2a2a4a; border-radius: 12px; color: #e0e0e0; }
        .form-control { background-color: #0a0a0f; border: 1px solid #2a2a4a; color: #e0e0e0; }
        .form-control:focus { background-color: #0a0a0f; border-color: #7f77dd; color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(127,119,221,0.25); }
        .form-control::placeholder { color: #555; }
        .btn-primary { background-color: #7f77dd; border: none; font-weight: 500; }
        .btn-primary:hover { background-color: #534ab7; }
        .btn-primary:disabled { background-color: #3c3489; }
        .text-muted { color: #666 !important; }
        a { color: #7f77dd; }
        a:hover { color: #534ab7; }
        .badge-ai { background-color: #7f77dd; color: white; font-size: 11px; padding: 3px 8px; border-radius: 20px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand">AgentOS</span>
        <div class="d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
            <span class="text-muted small">{{ user.email }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
